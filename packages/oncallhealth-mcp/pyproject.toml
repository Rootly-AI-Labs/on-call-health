[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "oncallhealth-mcp"
version = "0.1.0"
description = "MCP server for On-Call Health burnout analysis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "On-Call Health", email = "support@oncallhealth.ai" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = ["mcp", "on-call", "health", "burnout", "analysis"]
dependencies = [
    "mcp>=1.24.0,<2.0",
    "httpx>=0.28.0",
    "tenacity>=9.0.0",
    "aiobreaker>=1.2.0",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://oncallhealth.ai"
Repository = "https://github.com/on-call-health/oncallhealth-mcp"
Issues = "https://github.com/on-call-health/oncallhealth-mcp/issues"
Documentation = "https://oncallhealth.ai/docs/mcp"

[project.scripts]
oncallhealth-mcp = "oncallhealth_mcp.cli:main"

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/oncallhealth_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--cov=oncallhealth_mcp",
    "--cov-report=term-missing",
    "--cov-report=html",
]
