name: Claude Code Review

on:
  # Respond to @claude mentions in PR comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Also run on new PRs and updates
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Interactive Claude assistant - responds to @claude mentions
  claude-assistant:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          timeout_minutes: 30

  # Automatic security review on PRs
  security-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Security Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          direct_prompt: |
            Review this PR for security issues. Focus on:
            - SQL injection, XSS, command injection
            - Authentication/authorization flaws
            - Sensitive data exposure
            - Insecure dependencies
            - OWASP Top 10 vulnerabilities

            Only comment if you find actual security concerns. Be concise.
          timeout_minutes: 15
